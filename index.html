<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./images/favicon-32x32.png"
    />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700&display=swap"
      rel="stylesheet"
    />

    <title>Frontend Mentor | QR code component</title>

    <style>
      :root {
        --color-white: hsl(0, 0%, 100%);
        --color-slate-300: hsl(212, 45%, 89%);
        --color-slate-500: hsl(216, 15%, 48%);
        --color-slate-900: hsl(218, 44%, 22%);
        --font-outfit: 'Outfit', sans-serif;
      }
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      .card__title {
        font-weight: 700;
        font-size: 1.375rem;
        line-height: 1.2;
        text-align: center;
        color: var(--color-slate-900);
      }
      .card__description {
        font-weight: 400;
        font-size: 0.9375rem;
        line-height: 1.4;
        letter-spacing: 0.01em;
        text-align: center;
        color: var(--color-slate-500);
      }
      body {
        min-height: 100vh;
        display: grid;
        place-items: center;
        background-color: var(--color-slate-300);
        font-family: var(--font-outfit);
        font-optical-sizing: auto;
      }
      .card {
        background-color: var(--color-white);
        display: flex;
        width: 320px;
        box-shadow: 0 25px 25px 0 rgba(0, 0, 0, 0.05);
        flex-direction: column;
        gap: 24px;
        padding: 16px 16px 40px 16px;
        border-radius: 20px;
      }
      .card__image {
        border-radius: 10px;
      }
      .card__content {
        display: flex;
        flex-direction: column;
        padding: 0 16px;
        gap: 16px;
      }
      .attribution {
        display: block;
        position: fixed;
        bottom: 10px;
        left: 50%;
        transform: translateX(-50%);
        font-size: 1rem;
        text-align: center;
      }
      @media (max-width: 440px) {
        .attribution {
          font-size: 0.6rem;
        }
      }
    </style>
  </head>

  <body>
    <main>
      <article class="card" aria-labelledby="card-title">
        <img
          class="card__image"
          src="./images/image-qr-code.png"
          alt="frontendmentor.io QR-code"
          width="288"
          height="288"
        />

        <div class="card__content">
          <h1 id="card-title" class="card__title">
            Improve your front-end skills by building projects
          </h1>
          <p class="card__description">
            Scan the QR code to visit Frontend Mentor and take your coding
            skills to the next level
          </p>
        </div>
      </article>
    </main>

    <footer class="attribution">
      Challenge by
      <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>.
      Coded by Krivchenko Vyacheslav.
    </footer>
  </body>
</html>
